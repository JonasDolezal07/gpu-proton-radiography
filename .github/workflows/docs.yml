name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write      # needed for gh-deploy to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history (useful if git-revision-date plugin is added later)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        # Pushes the built site to the gh-pages branch.
        # In GitHub repo settings → Pages → set Source to "Deploy from branch: gh-pages / root".
