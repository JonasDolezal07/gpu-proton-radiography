site_name: prad
site_description: GPU-accelerated relativistic proton radiography
site_url: https://jonasdolezal07.github.io/gpu-proton-radiography/
repo_url: https://github.com/JonasDolezal07/gpu-proton-radiography
repo_name: JonasDolezal07/gpu-proton-radiography
edit_uri: edit/main/docs/

theme:
  name: material
  logo: images/logo.png
  favicon: images/logo.png
  palette:
    - scheme: slate
      primary: indigo
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: quickstart.md
    - Python API: python_api.md
    - Input Decks (TOML): input_decks.md
  - Physics:
    - Source Geometry: geometry.md
    - Energy Spectra: spectra.md
    - Validation: validation.md
    - Numerical Robustness: convergence.md
    - Benchmarks: benchmark.md
    - Limitations: limitations.md
  - Reference:
    - File Formats: file_formats.md
    - Run Artifacts: run_artifacts.md
    - Rendering: rendering.md
    - Sweeps: sweeps.md
    - GUI: gui.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JonasDolezal07/gpu-proton-radiography
      name: Source on GitHub
    - icon: material/web
      link: https://jonasdolezal.com
      name: jonasdolezal.com

copyright: "© 2025 <a href='https://jonasdolezal.com'>Jonas Dolezal</a> — MIT Licence"
